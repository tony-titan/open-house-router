# fly.toml app configuration file generated for open-house-router on 2026-04-07T02:47:25-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-house-router'
primary_region = 'lax'

[build]

[env]
  NEXT_PUBLIC_ADS_ENABLED = 'true'
  NODE_ENV = 'production'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
